<html>
    <head>
        <title>Form Elements</title>
    </head>
    <body>
        <h2>Registration</h2>
        <form method="get">
       <fieldset>
        <legend>General Information:</legend>
        <table>
            <label for="fname">First Name:</label>
			<input type="text" name="firstname" id="fname">
            <br><br>
            <label for="fname">Last Name:</label>
			<input type="text" name="lastname" id="fname">
            <br><br>
            <label for="male">Gender:</label>
			<input type="radio" name="gender" id="male" value="male">
			<label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
			<label for="female">Female</label>
            <br><br>
            <label for="fname">Father's Name:</label>
			<input type="type" name="father'sname" id="fname">
            <input type="file" name="father'sname" id="fname">
            <br><br>
            <label for="fname">Mother's Name:</label>
			<input type="text" name="mother'sname" id="fname">
            <br><br>
            <label for="fname">Blood Group:</label>
			<select>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
            </select>
            <br><br>
            <label for="fname">Relagion:</label>
            <select>
            <option>Islam</option>
            <option>Hindu</option>
            <option>Christian</option>
            <option>Buddhist</option>
            </select>
            <br><br>
        </table>
       </fieldset> 
       <fieldset>
        <legend>Contact Information</legend>
        <table>
            <label for="fname">Email:</label>
			<input type="text" name="email" id="fname">
            <br><br>
            <label for="fname">Phone/Mobile:</label>
			<input type="text" name="phone/mobile" id="fname">
            <br><br>
            <label for="fname">Website:</label>
			<input type="text" name="website" id="fname">
            <br><br>
            Present Address<br>
            <select>
                <option>Banglagesh</option>
            </select>
            <select>
                <option>Dhaka</option>
            </select>
            <br><br>
            <label for="fname">Address:</label>
			<input placeholder="Road/Street/City" name="address" id="fname">
            <input placeholder="Post Code" name="address" id="fname">
        </table>
       </fieldset>
       <fieldset>
        <legend>Account Information</legend>
        <table>
            <label for="fname">Username:</label>
			<input type="text" name="username" id="fname">
            <br><br>
             <label for="fname">Password:</label>
			<input type="text" name="password" id="fname">
            <br><br>
             <label for="fname">Confirm Password:</label>
			<input type="text" name="password" id="fname">
            <br><br>
             <input type="submit" value="Register">
        </table>
       </fieldset>
       </form>
    </body>
</html>
